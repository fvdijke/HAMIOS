name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax-check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install pillow

      - name: Syntax check
        run: python -m py_compile HAMIOS.py theme_manager.py

      - name: Flake8 (errors only)
        run: |
          pip install flake8
          flake8 HAMIOS.py theme_manager.py --select=E9,F63,F7,F82 --max-line-length=120
